<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRO VR</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0f14;color:#fff;}
header{position:fixed;top:0;width:100%;background:#0f141a;padding:15px;text-align:center;border-bottom:1px solid #1c2229;z-index:1000;}
header h1{color:#00ffe0;font-size:2.2em;}
nav{margin-top:5px;}
nav a{margin:0 12px;color:#ccc;font-weight:600;cursor:pointer;}
nav a:hover{color:#00ffe0;}
.nav-admin{background:#00ffe0;color:#000;padding:2px 6px;border-radius:4px;font-size:0.75em;margin-left:5px;}

section{display:none;padding:140px 20px 60px;max-width:1100px;margin:auto;}
section.active{display:block;}

h2{text-align:center;color:#00ffe0;margin-bottom:20px;}
p{text-align:center;margin-bottom:20px;color:#ccc;}

.hero{text-align:center;}
.hero img{width:220px;border-radius:20px;margin:20px 0;}
.btn{background:#00ffe0;color:#000;padding:12px 25px;border-radius:10px;margin:8px;display:inline-block;font-weight:600;}
.btn:hover{opacity:0.8;}

.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:20px;}
.card{background:#121821;padding:20px;border-radius:12px;border:1px solid #1f2a35;width:260px;text-align:center;}
.card.active{background:#00ff6a;color:#000;}

.status{text-align:center;font-size:1.2em;margin-top:10px;}
.countdown,.dates{text-align:center;font-size:0.9em;color:#aaa;margin-top:10px;}

.admin{display:none;background:#121821;padding:20px;border-radius:12px;margin-top:30px;}
.admin input, .admin select{width:100%;padding:8px;margin-bottom:10px;border-radius:6px;border:none;background:#1c2430;color:#fff;}
.admin button{width:100%;padding:10px;background:#00ffe0;border:none;font-weight:600;margin-bottom:10px;}
.playtest-list{margin-top:10px;}
.playtest-item{display:flex;justify-content:space-between;background:#1c2430;padding:8px;border-radius:6px;margin-bottom:5px;}

footer{text-align:center;padding:30px;color:#777;margin-top:40px;border-top:1px solid #1c2229;}
</style>
</head>
<body>

<header>
<h1>GRO VR</h1>
<nav>
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('play')">Play</a>
<a onclick="showSection('youtube')">YouTube</a>
<a onclick="showSection('api')">API</a>
<span class="nav-admin" onclick="adminPass()">Admin</span>
</nav>
</header>

<section id="home" class="active">
<div class="hero">
<h2>Ultimate VR Gardening Adventure</h2>
<img src="IMG_3959.jpeg">
<p>Climb, swing, and grow your VR garden with GRO VR.</p>
<a class="btn" onclick="showSection('play')">Play</a>
<a class="btn" onclick="showSection('api')">Playtests</a>
</div>
</section>

<section id="play">
<h2>Play GRO VR</h2>
<p>Join the App Lab playtest.</p>
<div style="text-align:center;">
<a href="https://www.meta.com/experiences/gro/24696055850016802/" class="btn">Open App Lab</a>
</div>
</section>

<section id="youtube">
<h2>YouTube</h2>
<p>Watch updates and trailers.</p>
<div style="text-align:center;">
<a href="https://www.youtube.com/@GRO.VRgame" class="btn">Visit Channel</a>
</div>
</section>

<section id="api">
<h2>Playtests</h2>
<div class="status" id="status"></div>
<div class="cards" id="cards"></div>
<div class="countdown" id="countdown"></div>
<div class="dates" id="dates"></div>

<div class="admin" id="admin">
<h3>Manage Playtests</h3>

<input type="text" id="msg" placeholder="Message">

<input type="datetime-local" id="start">
<input type="datetime-local" id="end">

<select id="timezone">
<option value="EST">EST</option>
<option value="UTC">UTC</option>
<option value="GST">GST (UAE)</option>
</select>

<button onclick="addPlaytest()">Add Playtest</button>

<div class="playtest-list" id="list"></div>

<button onclick="save()">Save</button>
</div>
</section>

<footer>
© 2026 GRO VR
</footer>

<script>
function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo(0,0);
}

function adminPass(){
if(prompt("Passcode")=="5293"){
document.getElementById("admin").style.display="block";
}
}

let data={
message:"Join the playtest!",
playtests:[
{start:"2026-03-28T14:00:00",end:"2026-03-28T18:00:00",tz:"EST"},
{start:"2026-03-29T14:00:00",end:"2026-03-29T18:00:00",tz:"EST"}
]
};

if(localStorage.getItem("data")){
data=JSON.parse(localStorage.getItem("data"));
}

function addPlaytest(){
let s=document.getElementById("start").value;
let e=document.getElementById("end").value;
let tz=document.getElementById("timezone").value;
data.playtests.push({start:s,end:e,tz:tz});
renderList();
update();
}

function deletePlaytest(i){
data.playtests.splice(i,1);
renderList();
update();
}

function renderList(){
let list=document.getElementById("list");
list.innerHTML="";
data.playtests.forEach((p,i)=>{
let div=document.createElement("div");
div.className="playtest-item";
div.innerHTML=`${p.start} (${p.tz}) <button onclick="deletePlaytest(${i})">X</button>`;
list.appendChild(div);
});
}

function save(){
data.message=document.getElementById("msg").value;
localStorage.setItem("data",JSON.stringify(data));
update();
}

function update(){
let now=new Date();
let active=false;
let cards=document.getElementById("cards");
cards.innerHTML="";

data.playtests.forEach(p=>{
let start=new Date(p.start);
let end=new Date(p.end);
let is=now>=start&&now<=end;
if(is)active=true;

let c=document.createElement("div");
c.className="card"+(is?" active":"");
c.innerHTML=`Start: ${start.toLocaleString()} (${p.tz})<br>End: ${end.toLocaleString()} (${p.tz})`;
cards.appendChild(c);
});

document.getElementById("status").innerHTML=active?"ACTIVE":"INACTIVE";
document.getElementById("dates").innerHTML=data.playtests.map(p=>`${p.start} - ${p.end} (${p.tz})`).join("<br>");
}

setInterval(update,1000);
renderList();
update();
</script>

</body>
</html>
